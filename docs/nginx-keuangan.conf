# ============================================================
# Konfigurasi Nginx untuk PWA Keuangan Keluarga
# Simpan sebagai: /etc/nginx/sites-available/keuangan
# Lalu aktifkan dengan symlink ke sites-enabled (lihat panduan)
#
# Catatan: root diarahkan ke ISI folder dist/ hasil `npm run build`,
# bukan source code project. Nama file JS/CSS di dalamnya sudah
# di-hash otomatis oleh Vite (mis. index-a1b2c3.js) sehingga aman
# di-cache lama tanpa risiko stale cache.
# ============================================================

server {
    listen 80;
    server_name GANTI_DENGAN_DOMAIN_ANDA;  # contoh: 123.45.67.89.nip.io

    root /var/www/keuangan;
    index index.html;

    # Service worker & manifest (dihasilkan vite-plugin-pwa) tidak boleh
    # di-cache lama agar update PWA terdeteksi klien secepatnya
    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Asset hasil build Vite (nama file sudah di-hash) boleh di-cache lama
    location ~* \.(css|js|png|jpg|jpeg|svg|ico|webmanifest)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Blokir akses ke file sensitif (jaga-jaga bila ada yang tidak sengaja terupload)
    location ~ /\. {
        deny all;
    }
    location ~* \.(sql|md|sh|env)$ {
        deny all;
    }
}
